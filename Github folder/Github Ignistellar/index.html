<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ignistellar</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07000f;
  --bg2: #0e0020;
  --bg3: #150030;
  --violet: #7C3AED;
  --violet2: #9333EA;
  --violet3: #A855F7;
  --violet4: #C084FC;
  --pink: #E879F9;
  --gold: #FFD700;
  --gold2: #FFAA44;
  --text: #F3E8FF;
  --text2: #C4B5D4;
  --border: rgba(168,85,247,0.25);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Raleway',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.08) 0%, transparent 60%),radial-gradient(ellipse at 80% 80%, rgba(233,121,249,0.06) 0%, transparent 60%);pointer-events:none;z-index:0;}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(7,0,15,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 1.5rem;}
.header-inner{display:flex;align-items:center;justify-content:space-between;max-width:900px;margin:0 auto;height:64px;}
.logo-wrap{display:flex;align-items:center;gap:12px;}
.logo-name{font-family:'Cinzel',serif;font-size:22px;font-weight:700;letter-spacing:3px;background:linear-gradient(135deg,var(--violet4),var(--pink),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.lang-btn{padding:5px 14px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;color:var(--violet4);background:transparent;font-family:'Raleway',sans-serif;letter-spacing:1px;transition:all 0.2s;}
.lang-btn:hover{background:rgba(168,85,247,0.15);}

/* TABS */
.tabs{display:flex;justify-content:center;gap:8px;padding:1.25rem 1rem;max-width:900px;margin:0 auto;}
.tab{flex:1;max-width:200px;padding:10px 16px;border:1px solid var(--border);border-radius:30px;cursor:pointer;font-size:13px;color:var(--text2);background:transparent;font-family:'Raleway',sans-serif;letter-spacing:1px;transition:all 0.2s;text-align:center;}
.tab:hover{border-color:var(--violet3);color:var(--violet4);}
.tab.active{background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(233,121,249,0.15));border-color:var(--violet3);color:var(--text);font-weight:500;}

/* SECTIONS */
.sec{display:none;max-width:900px;margin:0 auto;padding:0 1rem 2rem;}
.sec.active{display:block;}

/* CARDS */
.card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:16px;padding:1.25rem;}
.card-title{font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;color:var(--violet4);margin-bottom:12px;text-transform:uppercase;}
.sttl{font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;color:var(--violet4);text-transform:uppercase;margin:1.5rem 0 10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
input,select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:rgba(255,255,255,0.04);color:var(--text);font-family:'Raleway',sans-serif;outline:none;transition:border-color 0.2s;}
input:focus,select:focus{border-color:var(--violet3);}
input::placeholder{color:var(--text2);}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;letter-spacing:0.5px;}
.fg{margin-bottom:12px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.full{grid-column:1/-1;}
.btn{padding:11px 24px;border:none;border-radius:30px;cursor:pointer;font-size:14px;font-family:'Raleway',sans-serif;font-weight:500;letter-spacing:1px;transition:all 0.2s;}
.btn-primary{background:linear-gradient(135deg,var(--violet),var(--violet2));color:#fff;}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-ghost:hover{border-color:var(--violet3);color:var(--violet4);}
.badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:0.5px;}
.badge-v{background:rgba(168,85,247,0.2);color:var(--violet4);border:1px solid rgba(168,85,247,0.3);}
.badge-g{background:rgba(34,197,94,0.15);color:#86efac;border:1px solid rgba(34,197,94,0.25);}
.badge-a{background:rgba(255,170,68,0.15);color:#fcd34d;border:1px solid rgba(255,170,68,0.25);}
.badge-r{background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.25);}

/* HORA PLANETARIA */
.top-row{display:flex;gap:12px;margin-bottom:1rem;flex-wrap:wrap;}
.clock-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:16px;padding:1.25rem 1.5rem;text-align:center;min-width:160px;}
.clock-big{font-family:'Cinzel',serif;font-size:36px;font-variant-numeric:tabular-nums;background:linear-gradient(135deg,var(--violet4),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.clock-date{font-size:12px;color:var(--text2);margin-top:4px;}
.cur-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:16px;padding:1.25rem;flex:2;min-width:220px;}
.cur-name{font-family:'Cinzel',serif;font-size:22px;margin:6px 0 4px;}
.cur-sub{font-size:12px;color:var(--text2);margin-bottom:10px;}
.prog{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin:8px 0;}
.prog-bar{height:100%;border-radius:2px;transition:width 1s;}
.hgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;}
.hi{padding:10px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,0.02);font-size:13px;}
.hi.cur{border-color:var(--violet3);background:rgba(124,58,237,0.15);}
.hi .hn{font-size:11px;color:var(--text2);margin-bottom:3px;}
.hi.cur .hn{color:var(--violet4);}
.hi .hr{font-size:11px;color:var(--text2);margin-top:3px;}
.hi.cur .hr{color:var(--violet4);}
.meaning-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;}
.mcard{padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,0.02);}
.mcard .mname{font-size:13px;font-weight:500;margin-bottom:4px;}
.mcard .mdesc{font-size:12px;color:var(--text2);line-height:1.5;}

/* CARTA NATAL */
.city-wrap{position:relative;}
.city-list{position:absolute;z-index:99;background:#150030;border:1px solid var(--border);border-radius:12px;width:100%;max-height:200px;overflow-y:auto;margin-top:4px;}
.city-item{padding:10px 14px;cursor:pointer;font-size:13px;transition:background 0.15s;}
.city-item:hover{background:rgba(168,85,247,0.15);}
.tabs-inner{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
.tab-inner{padding:6px 16px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;color:var(--text2);background:transparent;font-family:'Raleway',sans-serif;letter-spacing:0.5px;}
.tab-inner.active{background:rgba(168,85,247,0.2);border-color:var(--violet3);color:var(--violet4);}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
.pcard{padding:10px 14px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,0.02);}
.housegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
.housecard{padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.02);font-size:13px;}
.aspect-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;flex-wrap:wrap;}
.transit-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;flex-wrap:wrap;}
.ai-box{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:16px;padding:1.5rem;}
.ai-txt{font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap;}
.interp-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:12px;}
.interp-title{font-family:'Cinzel',serif;font-size:14px;letter-spacing:1px;margin-bottom:8px;}
.interp-text{font-size:13px;color:var(--text2);line-height:1.7;}
.loading::after{content:'...';animation:dots 1.2s steps(4,end) infinite;}
@keyframes dots{0%,100%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

/* ANGEL NUMBERS */
.angel-search{display:flex;gap:8px;max-width:360px;margin:0 auto 1.5rem;}
.angel-search input{font-size:24px;text-align:center;letter-spacing:4px;font-family:'Cinzel',serif;}
.quick-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:1.5rem;}
.qnum{padding:8px 16px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-size:14px;font-family:'Cinzel',serif;letter-spacing:2px;color:var(--violet4);background:transparent;transition:all 0.15s;}
.qnum:hover{background:rgba(168,85,247,0.15);border-color:var(--violet3);}
.angel-card{border-radius:20px;border:1px solid var(--border);overflow:hidden;margin-bottom:1rem;}
.angel-header{padding:2rem;text-align:center;}
.angel-num{font-family:'Cinzel',serif;font-size:56px;font-weight:700;letter-spacing:4px;margin-bottom:8px;}
.angel-name{font-size:16px;font-weight:500;margin-bottom:4px;}
.angel-vibe{font-size:13px;opacity:0.75;}
.angel-body{padding:1.5rem;}
.angel-sec-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:8px;}
.angel-sec-text{font-size:14px;line-height:1.7;margin-bottom:1.25rem;}
.affirmation{border-left:3px solid;border-radius:0 12px 12px 0;padding:12px 16px;font-size:14px;font-style:italic;line-height:1.6;background:rgba(255,255,255,0.03);margin:12px 0;}
.areas{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-top:8px;}
.area{padding:8px 12px;border-radius:10px;border:1px solid;font-size:12px;text-align:center;}
.daily-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px;}
.daily-item{text-align:center;}
.daily-num{font-family:'Cinzel',serif;font-size:28px;letter-spacing:2px;}
.daily-lbl{font-size:11px;color:var(--text2);margin-top:4px;}

/* SIGN INTERP SECTION */
.big3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1rem;}
.b3card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:14px;padding:1rem;text-align:center;}
.b3icon{font-size:28px;margin-bottom:6px;}
.b3label{font-size:11px;letter-spacing:1px;color:var(--text2);text-transform:uppercase;margin-bottom:4px;}
.b3sign{font-family:'Cinzel',serif;font-size:18px;margin-bottom:4px;}
.b3deg{font-size:11px;color:var(--text2);}

@media(max-width:600px){
  .grid2{grid-template-columns:1fr;}
  .big3{grid-template-columns:1fr;}
  .top-row{flex-direction:column;}
  .tabs{gap:6px;}
  .tab{font-size:11px;padding:8px 10px;}
  .logo-name{font-size:18px;}
}
</style>
</head>

<div style="max-width:900px;margin:0 auto;padding:0 1rem;">
  <div class="tabs">
    <button class="tab active" onclick="sw('horas')" id="tab-horas"></button>
    <button class="tab" onclick="sw('carta')" id="tab-carta"></button>
    <button class="tab" onclick="sw('angel')" id="tab-angel"></button>
  </div>
</div>

<!-- HORA PLANETARIA -->
<div id="s-horas" class="sec active">
  <div class="top-row">
    <div class="clock-card">
      <div class="clock-big" id="clk">--:--:--</div>
      <div class="clock-date" id="clk-date"></div>
    </div>
    <div class="cur-card">
      <div id="day-badge" class="badge badge-v" style="font-size:12px;"></div>
      <div class="cur-name" id="ch-name">--</div>
      <div class="cur-sub" id="ch-sub"></div>
      <div class="prog"><div class="prog-bar" id="ch-bar" style="width:0%"></div></div>
      <div style="font-size:12px;color:var(--text2);" id="ch-pct"></div>
    </div>
  </div>
  <div class="sttl" id="sttl-24h"></div>
  <div class="hgrid" id="hlist"></div>
  <div class="sttl" id="sttl-meanings"></div>
  <div class="meaning-grid" id="meanings"></div>
</div>

<!-- CARTA NATAL -->
<div id="s-carta" class="sec">
  <div id="carta-form">
    <div class="grid2">
      <div class="fg"><label id="lbl-fecha"></label><input type="date" id="bd"></div>
      <div class="fg"><label id="lbl-hora"></label><input type="time" id="bt" value="12:00"></div>
      <div class="fg full">
        <label id="lbl-ciudad"></label>
        <div class="city-wrap">
          <input type="text" id="city-input" oninput="searchCity(this.value)" autocomplete="off">
          <div class="city-list" id="city-list" style="display:none;"></div>
        </div>
        <div style="font-size:11px;color:var(--text2);margin-top:4px;" id="coord-display"></div>
      </div>
      <input type="hidden" id="blat"><input type="hidden" id="blon">
      <div class="fg full"><label id="lbl-nombre"></label><input type="text" id="bname"></div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="calcChart()" id="btn-calc"></button>
      <button class="btn btn-ghost" onclick="loadDemo()" id="btn-demo"></button>
    </div>
  </div>
  <div id="res" style="display:none;margin-top:1.5rem;"></div>
</div>

<!-- ANGEL NUMBERS -->
<div id="s-angel" class="sec">
  <div style="text-align:center;padding:1rem 0 0.5rem;">
    <div class="angel-search">
      <input type="text" id="angel-input" maxlength="6" oninput="this.value=this.value.replace(/[^0-9]/g,'')" onkeydown="if(event.key==='Enter')lookupAngel()">
      <button class="btn btn-primary" onclick="lookupAngel()" id="btn-angel-search"></button>
    </div>
  </div>
  <div class="card" style="margin-bottom:1rem;">
    <div class="card-title" id="angel-daily-title"></div>
    <div style="font-size:12px;color:var(--text2);" id="daily-date"></div>
    <div class="daily-grid" id="daily-grid"></div>
  </div>
  <div class="sttl" id="sttl-quick"></div>
  <div class="quick-grid" id="quick-nums"></div>
  <div id="angel-result" style="display:none;"></div>
</div>

function fmt(d){return d.toLocaleTimeString(LANG==='es'?'es':'en',{hour:'2-digit',minute:'2-digit'});}
function getDayRuler(d){return DAY_RULERS[DAYS_EN[d.getDay()]];}
function getSunriseSunset(lat,lon,date){
  const rad=Math.PI/180,J=date.valueOf()/86400000+2440587.5;
  const n=Math.round(J-2451545-0.0009-lon/360);
  const Js=2451545+0.0009+lon/360+n;
  const M=(357.5291+0.98560028*(Js-2451545))%360;
  const C=1.9148*Math.sin(M*rad)+0.02*Math.sin(2*M*rad)+0.0003*Math.sin(3*M*rad);
  const lam=(M+C+180+102.9372)%360;
  const Jt=Js+0.0053*Math.sin(M*rad)-0.0069*Math.sin(2*lam*rad);
  const decl=Math.asin(Math.sin(lam*rad)*Math.sin(23.45*rad));
  const cosH=(Math.sin(-0.833*rad)-Math.sin(lat*rad)*Math.sin(decl))/(Math.cos(lat*rad)*Math.cos(decl));
  if(cosH<-1||cosH>1)return null;
  const H=Math.acos(cosH)/rad;
  const toD=J=>new Date((J-2440587.5)*86400000);
  return{rise:toD(Jt-H/360),set:toD(Jt+H/360)};
}
function getPlanetaryHours(lat,lon,date){
  const ss=getSunriseSunset(lat||19.43,lon||(-99.13),date);
  if(!ss)return null;
  const ruler=getDayRuler(date);
  const si=CHALDEAN.indexOf(ruler);
  const sr=ss.rise.getTime(),sset=ss.set.getTime();
  const ns=getSunriseSunset(lat||19.43,lon||(-99.13),new Date(date.getTime()+86400000));
  const nr=ns?ns.rise.getTime():sset+43200000;
  const dl=(sset-sr)/12,nl=(nr-sset)/12;
  const hrs=[];
  for(let i=0;i<12;i++)hrs.push({num:i+1,planet:CHALDEAN[(si+i)%7],start:new Date(sr+i*dl),end:new Date(sr+(i+1)*dl),isDay:true});
  for(let i=0;i<12;i++)hrs.push({num:i+13,planet:CHALDEAN[(si+12+i)%7],start:new Date(sset+i*nl),end:new Date(sset+(i+1)*nl),isDay:false});
  return hrs;
}
function renderHoras(){
  const now=new Date();
  const hrs=getPlanetaryHours(19.43,-99.13,now);
  if(!hrs)return;
  const cur=hrs.find(h=>Date.now()>=h.start&&Date.now()<h.end);
  const ruler=getDayRuler(now);
  document.getElementById('day-badge').textContent=t('dayOf')+' '+ruler+' '+(PSYM[ruler]||'');
  if(cur){
    document.getElementById('ch-name').textContent=(PSYM[cur.planet]||'')+(LANG==='es'?' Hora de ':' Hour of ')+cur.planet;
    document.getElementById('ch-sub').textContent=(cur.isDay?t('diurna'):t('nocturna'))+' · '+fmt(cur.start)+' – '+fmt(cur.end);
    const p=(Date.now()-cur.start)/(cur.end-cur.start)*100;
    const b=document.getElementById('ch-bar');
    b.style.width=p.toFixed(1)+'%';
    b.style.background=`linear-gradient(90deg,${PCOL[cur.planet]},${PCOL[cur.planet]}aa)`;
    document.getElementById('ch-pct').textContent=Math.round(p)+'% '+t('transcurrida');
  }
  document.getElementById('sttl-24h').textContent=t('sttl24');
  document.getElementById('hlist').innerHTML=hrs.map(h=>{
    const ic=cur&&h.num===cur.num;
    return`<div class="hi${ic?' cur':''}">
      <div class="hn">${t('hora')} ${h.num} ${h.isDay?t('sun'):t('moon')}</div>
      <div style="font-size:15px;color:${PCOL[h.planet]}">${PSYM[h.planet]||''} ${h.planet}</div>
      <div class="hr">${fmt(h.start)}–${fmt(h.end)}</div>
    </div>`;
  }).join('');
  renderMeanings();
}
function renderMeanings(){
  document.getElementById('sttl-meanings').textContent=t('sttlMeanings');
  const mPlanets=['Sol','Luna','Mercurio','Venus','Marte','Júpiter','Saturno'];
  document.getElementById('meanings').innerHTML=mPlanets.map(p=>`
    <div class="mcard">
      <div class="mname" style="color:${PCOL[p]}">${PSYM[p]} ${p}</div>

    </div>`).join('');
}

// ═══════════════════════════════════════
function toSign(deg){
  const d=((deg%360)+360)%360;
  const s=Math.floor(d/30);
  return{sign:SIGNS[s],signEn:SIGNS_EN[s],sym:SIGN_SYM[s],deg:Math.floor(d%30)};
}
function sunLon(jd){const n=jd-2451545;const L=(280.460+0.9856474*n)%360;const g=(357.528+0.9856003*n)*Math.PI/180;return((L+1.915*Math.sin(g)+0.020*Math.sin(2*g))+360)%360;}
function moonLon(jd){const n=jd-2451545;const L=(218.316+13.176396*n)%360;const M=(134.963+13.064993*n)*Math.PI/180;const F=(93.272+13.229350*n)*Math.PI/180;return((L+6.289*Math.sin(M)-1.274*Math.sin(2*F-M)+0.658*Math.sin(2*F))+360)%360;}
function pLon(jd,a,b){return((a+b*(jd-2451545))%360+360)%360;}
function ascendant(jd,lat,lon){const LST=((100.4606184+36000.77004*((jd-2451545)/36525)+lon)%360+360)%360;const E=23.439*Math.PI/180;const L=LST*Math.PI/180;const a=Math.atan2(Math.cos(L),-(Math.sin(L)*Math.cos(E)+Math.tan(lat*Math.PI/180)*Math.sin(E)));return(a*180/Math.PI+360)%360;}
function getAspects(planets){
  const res=[];
  for(let i=0;i<planets.length;i++)for(let j=i+1;j<planets.length;j++){
    const diff=Math.abs(planets[i].lon-planets[j].lon)%360;
    const ang=diff>180?360-diff:diff;
    for(const asp of ASPECTS_DEF){if(Math.abs(ang-asp.angle)<=asp.orb){res.push({p1:planets[i].name,p2:planets[j].name,asp,orb:(Math.abs(ang-asp.angle)).toFixed(1)});break;}}
  }
  return res;
}
function getTransits(natal){
  const jdNow=new Date().valueOf()/86400000+2440587.5;
  const tp=[{name:'Sol',lon:sunLon(jdNow)},{name:'Luna',lon:moonLon(jdNow)},{name:'Mercurio',lon:pLon(jdNow,252.251,4.092377)},{name:'Venus',lon:pLon(jdNow,181.979,1.602136)},{name:'Marte',lon:pLon(jdNow,355.433,0.524033)},{name:'Júpiter',lon:pLon(jdNow,34.351,0.083086)},{name:'Saturno',lon:pLon(jdNow,50.077,0.033371)}];
  const hits=[];
  for(const tp2 of tp)for(const np of natal){
    const diff=Math.abs(tp2.lon-np.lon)%360;const ang=diff>180?360-diff:diff;
    for(const asp of ASPECTS_DEF){if(Math.abs(ang-asp.angle)<=Math.min(asp.orb,4)){hits.push({transit:tp2,natal:np,asp,orb:(Math.abs(ang-asp.angle)).toFixed(1)});break;}}
  }
  return hits;
}

function showInner(tab){
  ['wheel','planets','aspects','transits','ai'].forEach((s,i)=>{
    const el=document.getElementById('inner-'+s);
    if(el)el.style.display=s===tab?'block':'none';
    document.querySelectorAll('.tab-inner')[i]&&document.querySelectorAll('.tab-inner')[i].classList.toggle('active',s===tab);
  });
}

function buildWheel(planets,ascDeg){
  const sz=300,cx=sz/2,cy=sz/2,R=136,r=92,ri=56;
  const toRad=d=>((d-ascDeg-90+360)%360)*Math.PI/180;
  let s=`<div style="display:flex;justify-content:center;margin-bottom:1rem;">
  <svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" xmlns="http://www.w3.org/2000/svg">`;
  s+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="rgba(168,85,247,0.2)" stroke-width="0.5"/>`;
  s+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(168,85,247,0.2)" stroke-width="0.5"/>`;
  s+=`<circle cx="${cx}" cy="${cy}" r="${ri}" fill="none" stroke="rgba(168,85,247,0.15)" stroke-width="0.5"/>`;
  for(let i=0;i<12;i++){
    const a1=(i*30-ascDeg%30-90)*Math.PI/180;
    s+=`<line x1="${cx+r*Math.cos(a1)}" y1="${cy+r*Math.sin(a1)}" x2="${cx+R*Math.cos(a1)}" y2="${cy+R*Math.sin(a1)}" stroke="rgba(168,85,247,0.2)" stroke-width="0.5"/>`;
    const ma=a1+15*Math.PI/180;
    s+=`<text x="${cx+(r+20)*Math.cos(ma)}" y="${cy+(r+20)*Math.sin(ma)}" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="rgba(196,181,212,0.7)">${SIGN_SYM[i]}</text>`;
  }
  planets.forEach(p=>{
    const a=toRad(p.lon),pr=ri+16;
    s+=`<text x="${cx+pr*Math.cos(a)}" y="${cy+pr*Math.sin(a)}" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="${PCOL[p.name]||'#C4B5D4'}">${PSYM[p.name]||'●'}</text>`;
  });
  const ax=cx+(r-3)*Math.cos(toRad(ascDeg)),ay=cy+(r-3)*Math.sin(toRad(ascDeg));
  const ax2=cx+(R+3)*Math.cos(toRad(ascDeg)),ay2=cy+(R+3)*Math.sin(toRad(ascDeg));
  s+=`<line x1="${ax}" y1="${ay}" x2="${ax2}" y2="${ay2}" stroke="#A855F7" stroke-width="1.5"/>`;
  s+=`<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="rgba(196,181,212,0.6)">ASC</text>`;
  s+=`</svg></div>`;
  return s;
}

async function getAIReading(){
  if(!chartData)return;
  const aiDiv=document.getElementById('ai-content');
  aiDiv.innerHTML=`<span class="loading" style="color:var(--violet4);">${t('interpWait')}</span>`;
  const{planets,ascDeg,aspects,name,dateVal,transits}=chartData;
  const ascS=toSign(ascDeg);
  const pList=planets.map(p=>{const s=toSign(p.lon);return`${p.name} in ${LANG==='es'?s.sign:s.signEn} ${s.deg}°`;}).join(', ');
  const aspList=aspects.slice(0,8).map(a=>`${a.p1} ${LANG==='es'?a.asp.name:a.asp.nameEn} ${a.p2}`).join(', ');
  const trList=transits.slice(0,5).map(tr=>`${tr.transit.name} ${LANG==='es'?tr.asp.name:tr.asp.nameEn} natal ${tr.natal.name}`).join(', ');
  const lang=LANG==='es'?'Spanish':'English';
  const prompt=`You are an expert astrologer. Write a warm, insightful birth chart reading for ${name} (born ${dateVal}) in ${lang}.

Sun: ${toSign(planets[0].lon)[LANG==='es'?'sign':'signEn']}
Moon: ${toSign(planets[1].lon)[LANG==='es'?'sign':'signEn']}  
Ascendant: ${ascS[LANG==='es'?'sign':'signEn']}
Planets: ${pList}
Key aspects: ${aspList||'none'}
Current transits: ${trList||'none'}

Write 4 short paragraphs: 1) Sun/Moon/Rising essence, 2) Most important aspects and what they mean personally, 3) What current transits say about their life right now, 4) An inspiring closing message. Max 350 words. No bullet points, no asterisks. Warm and personal tone.`;

  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await r.json();
    const txt=data.content?.find(x=>x.type==='text')?.text||'Could not get reading.';
    aiDiv.innerHTML=`<div class="ai-txt">${txt}</div>`;
  }catch(e){aiDiv.innerHTML=`<div style="color:#fca5a5;font-size:13px;">Error connecting. Please try again.</div>`;}
}

const QUICK_NUMBERS=['111','222','333','444','555','666','777','888','999','1111','1212'];

function initAngel(){
  document.getElementById('angel-daily-title').textContent=t('angelDailyTitle');
  document.getElementById('sttl-quick').textContent=t('sttlQuick');
  document.getElementById('btn-angel-search').textContent=t('angelSearch');
  const now=new Date();
  const y=now.getFullYear(),m=now.getMonth()+1,d=now.getDate();
  const sum=s=>s.split('').reduce((a,c)=>a+parseInt(c),0);
  let personal=sum(String(y)+String(m).padStart(2,'0')+String(d).padStart(2,'0'));
  while(personal>9&&![11,22,33].includes(personal))personal=sum(String(personal));
  document.getElementById('daily-date').textContent=now.toLocaleDateString(LANG==='es'?'es':'en',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('daily-grid').innerHTML=`
    <div class="daily-item"><div class="daily-num" style="color:var(--violet4)">${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}</div><div class="daily-lbl">${LANG==='es'?'Hora actual':'Current time'}</div></div>
    <div class="daily-item"><div class="daily-num" style="color:var(--gold)">${personal}</div><div class="daily-lbl">${LANG==='es'?'Número personal':'Personal number'}</div></div>
    <div class="daily-item"><div class="daily-num" style="color:var(--pink)">${d+m+(y%100)}</div><div class="daily-lbl">${LANG==='es'?'Número del día':'Day number'}</div></div>`;
  document.getElementById('quick-nums').innerHTML=QUICK_NUMBERS.map(n=>{
    const db=ANGEL_DB[n];
    return`<button class="qnum" onclick="lookupAngel('${n}')" style="color:${db?db.color:'var(--violet4)'}">${n}${db&&db.master?'<sup style="font-size:9px;">✦</sup>':''}</button>`;
  }).join('');
}

function lookupAngel(num){
  const n=num||document.getElementById('angel-input').value.trim();
  if(!n)return;
  document.getElementById('angel-input').value=n;
  const el=document.getElementById('angel-result');
  el.style.display='block';
  const db=ANGEL_DB[n]||generateAngel(n);
  renderAngelCard(n,db,el);
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function generateAngel(num){
  const base=parseInt(num[0])||1;
  const cols=['#94a3b8','#FFD700','#34d399','#A855F7','#38BDF8','#FB923C','#F472B6','#86efac','#FFD700','#818CF8'];
  const c=cols[base]||'#A855F7';
  const isRep=[...new Set(num.split(''))].length===1;
  return{name:{es:`Secuencia ${num}`,en:`Sequence ${num}`},vibe:{es:`Energía del ${base} amplificada`,en:`Energy of ${base} amplified`},color:c,bg:`rgba(168,85,247,0.05)`,master:isRep&&num.length>=3,
    message:{es:`La secuencia ${num} lleva la energía del número ${base} amplificada ${num.length} veces. Cuando ves este número, observa en qué estás pensando: ese pensamiento es importante.`,en:`The sequence ${num} carries the energy of number ${base} amplified ${num.length} times. When you see this number, notice what you're thinking about — that thought is important.`},
    love:{es:`La energía del ${base} en el amor trae mensajes importantes para tus relaciones.`,en:`The energy of ${base} in love brings important messages for your relationships.`},
    work:{es:`En lo profesional, esta secuencia indica atención y consciencia en tus acciones.`,en:`Professionally, this sequence indicates attention and awareness in your actions.`},
    spiritual:{es:`El universo te envía una señal única. Presta atención.`,en:`The universe sends you a unique signal. Pay attention.`},
    affirmation:{es:`Recibo con consciencia el mensaje del ${num}.`,en:`I consciously receive the message of ${num}.`},
    areas:{es:['Intuición','Señales','Consciencia','Sincronía'],en:['Intuition','Signs','Awareness','Synchronicity']}};
}

function renderAngelCard(num,db,el){
  const L=LANG;
  const masterBadge=db.master?`<span class="badge badge-v" style="font-size:11px;margin-left:8px;">✦ ${L==='es'?'Número Maestro':'Master Number'}</span>`:'';
  el.innerHTML=`
  <div class="angel-card">
    <div class="angel-header" style="background:${db.bg};border-bottom:1px solid var(--border);">
      <div class="angel-num" style="background:linear-gradient(135deg,${db.color},var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">${num}</div>
      <div class="angel-name" style="color:${db.color};">${db.name[L]}${masterBadge}</div>
      <div class="angel-vibe" style="color:${db.color};">${db.vibe[L]}</div>
    </div>
    <div class="angel-body">
      <div class="angel-sec-title">${t('msgUniverse')}</div>
      <div class="angel-sec-text">${db.message[L]}</div>
      <div class="affirmation" style="border-color:${db.color};">"${db.affirmation[L]}"</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:1rem;">
        <div><div class="angel-sec-title">${t('love')}</div><div style="font-size:13px;line-height:1.6;color:var(--text2);">${db.love[L]}</div></div>
        <div><div class="angel-sec-title">${t('work')}</div><div style="font-size:13px;line-height:1.6;color:var(--text2);">${db.work[L]}</div></div>
        <div><div class="angel-sec-title">${t('spiritual')}</div><div style="font-size:13px;line-height:1.6;color:var(--text2);">${db.spiritual[L]}</div></div>
      </div>
      <div style="margin-top:1rem;">
        <div class="angel-sec-title">${t('areas')}</div>
        <div class="areas">${db.areas[L].map(a=>`<div class="area" style="background:${db.bg};color:${db.color};border-color:${db.color}33;">${a}</div>`).join('')}</div>
      </div>
    </div>
  </div>
  <button class="btn btn-ghost" style="margin-top:8px;font-size:13px;" onclick="document.getElementById('angel-result').style.display='none';document.getElementById('angel-input').value='';">${t('anotherNum')}</button>`;
}

// INIT
applyLang();
initAngel();
</script>
